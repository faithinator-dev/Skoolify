<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Skoolify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div class="logo-box" style="margin: 0 auto 1.5rem; width: 64px; height: 64px; font-size: 2rem;">S</div>
            <h1 style="font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; color: var(--text-main);">Welcome Back</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-top: 0.5rem;">Enter your details to access Skoolify.</p>
        </div>
        
        <form id="loginForm">
            <div style="margin-bottom: 1.5rem;">
                <label for="email" style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-main);">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="admin@skoolify.com" required>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label for="password" style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-main);">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.95rem;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 500; color: var(--text-muted);">
                    <input type="checkbox" style="width: 18px; height: 18px; accent-color: var(--primary);"> Remember me
                </label>
                <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 700;">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1.1rem;">
                Sign in to Dashboard <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 2.5rem; font-size: 1rem; color: var(--text-muted); font-weight: 500;">
            Don't have an account? <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 700;">Contact Sales</a>
        </p>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
