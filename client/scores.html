<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scores | Skoolify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">S</div>
                <span class="logo-text">Skoolify</span>
            </div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="students.html" class="nav-link"><i class="fa-solid fa-user-graduate"></i> Students</a>
                <a href="attendance.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Attendance</a>
                <a href="scores.html" class="nav-link active"><i class="fa-solid fa-chart-line"></i> Scores</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="user-profile"><div class="avatar">AD</div></div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1>Academic Scores</h1>
                    <button class="btn btn-primary">Update All</button>
                </div>

                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Test (30)</th>
                                <th>Exam (70)</th>
                                <th>Total (100)</th>
                                <th>Grade</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Alex Johnson</td>
                                <td><input type="number" class="form-control" style="width: 80px;" value="25"></td>
                                <td><input type="number" class="form-control" style="width: 80px;" value="58"></td>
                                <td style="font-weight: bold;">83</td>
                                <td><span style="font-weight: 700; color: var(--primary);">A</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/scores.js"></script>
</body>
</html>
