<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students | Skoolify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">S</div>
                <span class="logo-text">Skoolify</span>
            </div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-link">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
                <a href="students.html" class="nav-link active">
                    <i class="fa-solid fa-user-graduate"></i> Students
                </a>
                <a href="teachers.html" class="nav-link">
                    <i class="fa-solid fa-chalkboard-user"></i> Teachers
                </a>
                <a href="attendance.html" class="nav-link">
                    <i class="fa-solid fa-calendar-check"></i> Attendance
                </a>
                <a href="scores.html" class="nav-link">
                    <i class="fa-solid fa-chart-line"></i> Scores
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="logoutBtn" class="nav-link" style="color: #ef4444;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="tableSearch" class="search-input" placeholder="Search students by name or admission number...">
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button class="btn btn-outline" style="padding: 12px; border-radius: var(--radius-full);">
                        <i class="fa-regular fa-bell"></i>
                    </button>
                    <div style="display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 6px 12px; background: white; border-radius: var(--radius-full); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
                        <div style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">AD</div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem;">
                    <div>
                        <h1 style="font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; color: var(--text-main);">Student Directory</h1>
                        <p style="color: var(--text-muted); font-size: 1.05rem; font-weight: 500;">Manage and view all registered students across all classes.</p>
                    </div>
                    <button class="btn btn-primary" id="addStudentBtn">
                        <i class="fa-solid fa-plus"></i> Enroll New Student
                    </button>
                </div>

                <div class="card">
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Full Name</th>
                                    <th>Admission No.</th>
                                    <th>Class Section</th>
                                    <th>Gender</th>
                                    <th>Enrolled Subjects</th>
                                    <th style="text-align: right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody">
                                <!-- Data will be populated by students.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/students.js"></script>
</body>
</html>
