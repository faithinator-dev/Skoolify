$kind: http-request
name: Update Resource
method: PUT
url: '{{baseUrl}}/api/resources/{{resourceId}}'
description: "Update a resource's details."
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Advanced Algebra Textbook",
      "url": "https://example.com/advanced-algebra.pdf"
    }
