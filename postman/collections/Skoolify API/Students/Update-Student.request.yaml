$kind: http-request
name: Update Student
method: PUT
url: '{{baseUrl}}/api/students/{{studentId}}'
description: "Update a student's details."
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Jane Smith",
      "grade": "11"
    }
