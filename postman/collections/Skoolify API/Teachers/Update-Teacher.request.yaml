$kind: http-request
name: Update Teacher
method: PUT
url: '{{baseUrl}}/api/teachers/{{teacherId}}'
description: "Update a teacher's details."
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Mr. Alan Grant",
      "subjects": ["Math", "Physics", "Chemistry"]
    }
